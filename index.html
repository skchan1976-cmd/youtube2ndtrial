                            <div className="flex items-center gap-3 text-sm text-outline font-medium">
                              <span className="text-primary font-bold">{currentVideo.author}</span>
                              <span className="w-1.5 h-1.5 rounded-full bg-outline-variant" />
                              <span>Oct 12, 2023</span>
                              <span className="w-1.5 h-1.5 rounded-full bg-outline-variant" />
                              <div className="flex items-center gap-1.5 bg-primary/5 px-2.5 py-1 rounded-lg text-primary text-xs font-bold uppercase tracking-wider">
                                <Icon name="verified" className="w-3.5 h-3.5" fill={true} />
                                Institutional
                              </div>
                            </div>
                          </div>
                          <div className="flex gap-3">
                            <button onClick={() => showToast('Added to Watch Later')} className="flex items-center gap-2 px-6 py-2.5 rounded-xl border border-outline-variant font-bold text-sm hover:bg-surface-container-low transition-all bg-white cursor-pointer">
                              <Icon name="bookmark" className="w-4 h-4" />
                              Save
                            </button>
                            <button onClick={() => showToast('Sharing window opened')} className="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-surface-container-high font-bold text-sm hover:bg-surface-dim transition-all border-none cursor-pointer">
                              <Icon name="share" className="w-4 h-4" />
                              Share
                            </button>
                          </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center justify-between bg-surface-container-low p-6 rounded-2xl border border-outline-variant/30 gap-6">
                          <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl bg-primary flex items-center justify-center text-on-primary shadow-lg">
                              <Icon name="filter_center_focus" className="w-6 h-6" fill={true} />
                            </div>
                            <div>
                              <h3 className="font-bold text-on-surface">Clean Stream Active</h3>
                              <p className="text-xs text-outline font-medium">Global ad-blocking and algorithmic filtering enabled.</p>
                            </div>
                          </div>
                          <div className="h-px sm:h-12 w-full sm:w-px bg-outline-variant/50" />
                          <div className="flex items-center gap-6">
                            <label className="flex items-center gap-3 cursor-pointer select-none">
                              <div className="relative">
                                <input 
                                  type="checkbox" 
                                  checked={isAdFree} 
                                  onChange={(e) => {
                                    setIsAdFree(e.target.checked);
                                    showToast(e.target.checked ? 'Global Ad-Free Enabled' : 'Ad Filters Suspended');
                                  }} 
                                  className="sr-only" 
                                />
                                <div className={`w-12 h-7 rounded-full transition-colors duration-300 ${isAdFree ? 'bg-primary' : 'bg-outline-variant'}`} />
                                <div className={`absolute top-1 left-1 w-5 h-5 bg-white rounded-full transition-transform duration-300 shadow-md ${isAdFree ? 'translate-x-5' : 'translate-x-0'}`} />
                              </div>
                              <span className="text-sm font-bold">Ad-Free</span>
                            </label>
                            <button onClick={() => blockAuthor(currentVideo.author)} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-error/10 text-error font-bold text-sm hover:bg-error/20 transition-all border border-error/20 cursor-pointer">
                              <Icon name="block" className="w-4 h-4" />
                              Filter Channel
                            </button>
                          </div>
                        </div>
                      </div>

                      <div>
                        <h2 className="text-xl font-bold font-display mb-6 flex items-center gap-2">
                          <Icon iconName="history" name="history" className="w-5 h-5 text-outline" />
                          Continue Watching
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {continueWatching.map((video, idx) => (
                            <div 
                              key={idx}
                              onClick={() => selectVideo(video)}
                              className="flex gap-4 p-4 rounded-3xl bg-white border border-outline-variant hover:border-primary/30 transition-all cursor-pointer group shadow-sm hover:shadow-xl hover:scale-[1.02]"
                            >
                              <div className="w-36 aspect-video rounded-xl overflow-hidden relative flex-shrink-0">
                                <img src={video.image} className="w-full h-full object-cover group-hover:scale-110 transition-all duration-700" alt="Video" />
                                <div className="absolute bottom-0 left-0 w-full h-1 bg-surface-container-high/50">
                                  <div className="h-full bg-primary" style={{ width: `${video.progress}%` }} />
                                </div>
                              </div>
                              <div className="flex flex-col justify-between py-1 overflow-hidden">
                                <div className="overflow-hidden">
                                  <h4 className="text-sm font-bold leading-tight line-clamp-2 transition-colors group-hover:text-primary mb-1">{video.title}</h4>
                                  <p className="text-[11px] text-outline font-semibold uppercase tracking-wider truncate">{video.source}</p>
                                </div>
                                <span className="text-[11px] text-outline font-medium">{video.timeLeft}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Sidebar Suggestions */}
                    <aside className="lg:col-span-4 flex flex-col gap-6">
                      <div className="bg-white border border-outline-variant rounded-3xl p-6 shadow-sm sticky top-30">
                        <div className="flex items-center justify-between mb-6 pb-4 border-b border-outline-variant/30">
                          <h2 className="font-bold flex items-center gap-2">
                            <Icon name="trending_up" className="w-5 h-5 text-primary" />
                            Highly Relevant
                          </h2>
                          <span className="text-[10px] font-black uppercase tracking-widest bg-primary/5 text-primary px-2 py-1 rounded">AD-FREE</span>
                        </div>

                        <div className="flex flex-col gap-6">
                          {!isAdFree && (
                            <div className="bg-surface-container-high p-4 rounded-2xl border border-outline-variant relative overflow-hidden group">
                              <div className="flex gap-4 items-center mb-2">
                                <div className="w-10 h-10 rounded bg-primary flex items-center justify-center text-on-primary font-black text-xs">AD</div>
                                <div className="flex-1">
                                  <h4 className="text-xs font-bold">Invest in the Future of AI</h4>
                                  <p className="text-[10px] text-outline">Sponsored by TechGrowth Capital</p>
                                </div>
                              </div>
                              <p className="text-[11px] mb-3 leading-relaxed">Diversify your institutional portfolio with early-access AI infrastructure funds. Limits apply.</p>
                              <button className="w-full py-2 bg-primary text-on-primary text-[11px] font-bold rounded-lg">Learn More</button>
                              <button 
                                onClick={() => { setIsAdFree(true); showToast('Ad dismissed. Upgrade to Premium for total removal.'); }}
                                className="absolute top-2 right-2 text-outline hover:text-on-surface p-1 opacity-0 group-hover:opacity-100 transition-opacity"
                              >
                                <Icon name="close" className="w-3 h-3" />
                              </button>
                            </div>
                          )}
                          {recommendations.map((video, idx) => (
                            <div 
                              key={idx}
                              onClick={() => selectVideo(video)}
                              className="flex gap-4 group cursor-pointer hover:scale-[1.02] transition-all"
                            >
                              <div className="w-28 h-18 bg-surface-dim rounded-xl overflow-hidden relative flex-shrink-0">
                                <img src={video.image} className="w-full h-full object-cover group-hover:scale-110 transition-all duration-700" alt="Rec" />
                                <span className="absolute bottom-1 right-1 bg-black/70 text-white text-[10px] px-1.5 rounded font-bold">{video.time}</span>
                              </div>
                              <div className="flex flex-col py-0.5 overflow-hidden">
                                <h4 className="text-[13px] font-bold leading-tight line-clamp-2 transition-colors group-hover:text-primary mb-1">{video.title}</h4>
                                <span className="text-[11px] text-outline font-medium truncate">{video.author}</span>
                                <div className="flex items-center gap-1.5 mt-1">
                                  <Icon name="trending_up" className="w-3 h-3 text-primary" />
                                  <span className="text-[10px] font-bold text-primary">{video.match} Match</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>

                        <button 
                          onClick={() => showToast('Loading more algorithmic insights...')}
                          className="w-full mt-8 py-3 text-center text-primary font-bold text-sm bg-primary/5 hover:bg-primary/10 rounded-xl transition-all flex items-center justify-center gap-2 border-none cursor-pointer"
                        >
                          <Icon name="expand_more" className="w-4 h-4" />
                          Load More Insights
                        </button>
                      </div>
                    </aside>
                  </div>
                </>
              )}
            </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
